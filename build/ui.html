<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">

    <title>UI</title>

    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=yes">
    <meta name="format-detection" content="telephone=no">

    <link rel="icon" type="image/png" href="images/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="images/favicon/favicon.svg" />
    <link rel="shortcut icon" href="images/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Сибирь" />
    <link rel="manifest" href="images/favicon/site.webmanifest" />

    <link rel="preload" href="fonts/subset-Montserrat-Bold.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="fonts/subset-Montserrat-SemiBold.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="fonts/subset-Montserrat-Medium.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="fonts/subset-Montserrat-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous">

    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="page">
    <header class="header">
        <div class="container"></div>
    </header>

    <div class="page__content">
        <div class="container">
            <ul class="breadcrumbs">
                <li class="breadcrumbs__item">
                    <a class="breadcrumbs__link" href="#">Главная</a>
                </li>
                <li class="breadcrumbs__item">
                    <a class="breadcrumbs__link" href="#">Услуги и цены</a>
                </li>
                <li class="breadcrumbs__item">
                    Оформление медкнижек в Ивантеевке
                </li>
            </ul>

            <h2>Кнопки</h2>

            <button class="button button--primary" type="button">Кнопка</button>

            <a class="button button--primary" href="#">Ссылка</a>

            <button class="button button--primary" type="button" disabled>Кнопка</button>

            <a class="button button--primary disabled">Ссылка</a>

            <br> <br>

            <button class="button button--secondary" type="button">Кнопка</button>

            <a class="button button--secondary" href="#">Ссылка</a>

            <button class="button button--secondary" type="button" disabled>Кнопка</button>

            <a class="button button--secondary disabled">Ссылка</a>

            <br> <br>

            <h2>Чекбоксы</h2>

            <label class="checkbox">
                <input type="checkbox" value="" name="">
                <span class="checkbox__icon"></span>
                <span class="checkbox__text">Нажимая на кнопку “Отправить”, я даю согласие на <a href="#">обработку персональных данных</a></span>
            </label>

            <br>

            <label class="checkbox">
                <input type="checkbox" value="" name="" checked>
                <span class="checkbox__icon"></span>
                <span class="checkbox__text">Нажимая на кнопку “Отправить”, я даю согласие на <a href="#">обработку персональных данных</a></span>
            </label>

            <br>

            <label class="checkbox">
                <input type="checkbox" value="" name="" disabled>
                <span class="checkbox__icon"></span>
                <span class="checkbox__text">Нажимая на кнопку “Отправить”, я даю согласие на <a href="#">обработку персональных данных</a></span>
            </label>

            <br>

            <label class="checkbox">
                <input type="checkbox" value="" name="" disabled checked>
                <span class="checkbox__icon"></span>
                <span class="checkbox__text">Нажимая на кнопку “Отправить”, я даю согласие на <a href="#">обработку персональных данных</a></span>
            </label>

            <br> <br>

            <h2>Поля ввода</h2>

            <div class="input-group">
                <input class="input" type="text" name="" placeholder="Ваш email">
            </div>

            <br>

            <div class="input-group">
                <input class="input error" type="text" name="" placeholder="Ваш email">

                <p class="error-text">Заполните это поле</p>
            </div>

            <br>

            <div class="input-group">
                <input class="input" type="text" name="" placeholder="Ваш email" disabled>
            </div>

            <br>


            <div class="input-group">
                <textarea class="textarea" placeholder="Ваш комментарий"></textarea>
            </div>

            <br>

            <div class="input-group">
                <textarea class="textarea error" placeholder="Ваш комментарий"></textarea>

                <p class="error-text">Заполните это поле</p>
            </div>

            <br>

            <div class="input-group">
                <textarea class="textarea" placeholder="Ваш комментарий" disabled></textarea>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
    
        </div>
    </footer>

    <script src="js/jquery-3.7.1.min.js"></script>
    
    <script src="js/main.js"></script>
</body>

</html>
